name: Sync Upstream

on:
  schedule:
    - cron: "0 */6 * * *"   # 每 6 小时自动同步
  workflow_dispatch:        # 允许你手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/MoonTVPlus/MoonTVPlus.git
          git fetch upstream

      - name: Merge Upstream
        run: |
          git merge upstream/main --allow-unrelated-histories || true

      - name: Push Changes
        run: |
          git push origin main
